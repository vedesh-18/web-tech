<!DOCTYPE html>
<html>
<head>
    <title>Course Enrollment System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Course Enrollment</h2>

    <p id="result"></p>

<script src="script.js"></script>
</body>
</html>
