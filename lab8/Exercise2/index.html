<!DOCTYPE html>
<html>
<head>
    <title>Student Object Example</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Student Details</h2>

    <input type="number" id="id" placeholder="Enter Student ID">
    <input type="text" id="name" placeholder="Enter Name">
    <input type="text" id="dept" placeholder="Enter Department">
    <input type="number" id="marks" placeholder="Enter Marks">

    <button onclick="createStudent()">Submit</button>

    <p id="result"></p>
</div>

<script src="script.js"></script>
</body>
</html>
