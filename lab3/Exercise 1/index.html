<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adaptive Registration System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="container">
    <h2>Adaptive Registration</h2>

    <form id="registrationForm" novalidate>

        <div class="field">
            <label for="name">Name</label>
            <input id="name" type="text">
            <small class="error" id="nameError"></small>
        </div>

        <div class="field">
            <label for="email">Email</label>
            <input id="email" type="email">
            <small class="error" id="emailError"></small>
        </div>

        <div class="field">
            <label for="role">Role</label>
            <select id="role">
                <option value="Student">Student</option>
                <option value="Teacher">Teacher</option>
                <option value="Admin">Admin</option>
            </select>
        </div>

        <div class="field" id="skillsBox">
            <label for="skills">Skills</label>
            <input id="skills" type="text">
        </div>

        <div class="field">
            <label for="age">Age</label>
            <input id="age" type="number">
            <small class="error" id="ageError"></small>
        </div>

        <div class="field">
            <label for="password">
                Password <span id="pwdHint">(min 6 chars)</span>
            </label>
            <input id="password" type="password">
            <div class="strength">
                <span></span>
            </div>
            <small class="error" id="passwordError"></small>
        </div>

        <div class="field">
            <label for="confirmPassword">Confirm Password</label>
            <input id="confirmPassword" type="password">
            <small class="error" id="confirmPasswordError"></small>
        </div>

        <button id="submitBtn" type="submit" disabled>Register</button>
    </form>
</main>

<script src="script.js"></script>
</body>
</html>
